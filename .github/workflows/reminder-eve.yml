name: Rappel veille (dimanche 18h)

on:
  schedule:
    # Dimanche 07:00 UTC = 18:00 heure de Noumea (UTC+11)
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: "Forcer l'envoi même si déjà envoyé aujourd'hui"
        type: boolean
        default: false

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Envoyer le rappel veille
        run: node .github/scripts/send-reminders.js eve ${{ inputs.force == true && '--force' || '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Supprimer les comptes en attente
        run: node .github/scripts/delete-users.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
