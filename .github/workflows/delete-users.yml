name: Suppression comptes (toutes les heures)

on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures
  workflow_dispatch:       # Déclenchement manuel depuis GitHub si besoin

jobs:
  delete-users:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Supprimer les comptes en attente
        run: node .github/scripts/delete-users.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
