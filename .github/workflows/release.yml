name: Release & Deploy

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Évite la boucle infinie sur le commit de version
    if: "!contains(github.event.head_commit.message, 'chore: release v')"

    permissions:
      contents: write  # pour pousser le tag et créer la release

    steps:
      - name: Checkout (avec historique complet pour les tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Générer environment.prod.ts
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/export const APP_VERSION = .*/export const APP_VERSION = '$APP_VERSION';/" src/version.ts
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            teamId: 'equipe-lundi',
            firebase: {
              apiKey: '${FIREBASE_API_KEY}',
              authDomain: '${FIREBASE_AUTH_DOMAIN}',
              projectId: '${FIREBASE_PROJECT_ID}',
              storageBucket: '${FIREBASE_STORAGE_BUCKET}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              appId: '${FIREBASE_APP_ID}',
            },
            vapidKey: '${FIREBASE_VAPID_KEY}',
          };
          EOF

      - name: Générer public/firebase-config.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          cat > public/firebase-config.js << EOF
          self.FIREBASE_SW_CONFIG = {
            apiKey: '${FIREBASE_API_KEY}',
            authDomain: '${FIREBASE_AUTH_DOMAIN}',
            projectId: '${FIREBASE_PROJECT_ID}',
            storageBucket: '${FIREBASE_STORAGE_BUCKET}',
            messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
            appId: '${FIREBASE_APP_ID}',
          };
          EOF

      - name: Build Angular (production)
        run: npm run build

      - name: Vérifier le contenu du build
        run: ls -la dist/croissant-angular/browser/ || echo "Dossier browser introuvable"

      - name: Déployer sur Firebase Hosting
        run: npx firebase-tools deploy --only hosting:croissant-lundi --project croissant-593e5 --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Incrémenter la version et mettre à jour CHANGELOG
        id: version
        run: |
          NEW_VERSION=$(node .github/scripts/bump-version.js)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit, tag et push
        if: steps.version.outputs.version != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Créer la GitHub Release
        if: steps.version.outputs.version != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(node -e "
            const fs = require('fs');
            const log = fs.readFileSync('CHANGELOG.md', 'utf8');
            const match = log.match(/## v[\s\S]*?(?=\n## v|\s*$)/);
            process.stdout.write(match ? match[0].trim() : 'Nouvelle version');
          ")
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "$NOTES"
