name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Java (requis pour l'émulateur Firestore)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Installer les dépendances
        run: npm install

      - name: Cache binaires émulateurs Firebase
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('package-lock.json') }}
          restore-keys: firebase-emulators-

      - name: Télécharger les binaires des émulateurs Firebase
        run: npx firebase setup:emulators:firestore

      - name: Installer Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Build Angular (configuration e2e)
        run: npx ng build --configuration e2e

      - name: Démarrer les émulateurs Firebase
        run: npx firebase emulators:start --only auth,firestore --project demo-croissant &

      - name: Démarrer le serveur Angular
        run: npx serve dist/croissant-angular/browser -l 4201 --single &

      - name: Attendre les serveurs
        run: npx wait-on http://localhost:9099 http://localhost:4201 --timeout 60000

      - name: Lancer les tests e2e
        run: npx playwright test

      - name: Upload rapport Playwright (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    needs: e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Générer environment.prod.ts (placeholder pour la vérification du build)
        run: |
          cat > src/environments/environment.prod.ts << 'EOF'
          export const environment = {
            production: true,
            useEmulators: false,
            teamId: 'equipe-lundi',
            firebase: {
              apiKey: 'placeholder',
              authDomain: 'placeholder',
              projectId: 'placeholder',
              storageBucket: 'placeholder',
              messagingSenderId: 'placeholder',
              appId: 'placeholder',
            },
            vapidKey: 'placeholder',
          };
          EOF

      - name: Build Angular (production)
        run: npm run build
