name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (requis pour l'émulateur Firestore)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Installer les dépendances
        run: npm install

      - name: Installer Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests e2e
        run: npm run e2e

      - name: Upload rapport Playwright (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    needs: e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Générer environment.prod.ts (placeholder pour la vérification du build)
        run: |
          cat > src/environments/environment.prod.ts << 'EOF'
          export const environment = {
            production: true,
            useEmulators: false,
            teamId: 'equipe-lundi',
            firebase: {
              apiKey: 'placeholder',
              authDomain: 'placeholder',
              projectId: 'placeholder',
              storageBucket: 'placeholder',
              messagingSenderId: 'placeholder',
              appId: 'placeholder',
            },
            vapidKey: 'placeholder',
          };
          EOF

      - name: Build Angular (production)
        run: npm run build
