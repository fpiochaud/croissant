name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Firebase config
        run: |
          mkdir -p croissant-app/config
          echo '{
            "apiKey": "${{ secrets.FIREBASE_API_KEY }}",
            "authDomain": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            "projectId": "${{ secrets.FIREBASE_PROJECT_ID }}",
            "storageBucket": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            "messagingSenderId": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            "appId": "${{ secrets.FIREBASE_APP_ID }}",
            "vapidKey": "${{ secrets.FIREBASE_VAPID_KEY }}"
          }' > croissant-app/config/firebase-config.json

      - name: Préparer le dossier bt
        run: |
          rm -rf bt
          mkdir bt
          cp -r croissant-app/* bt/

      - name: Log contenu du dossier bt
        run: |
          echo "Contenu du dossier bt :"
          ls -l bt
          echo "Contenu du dossier bt/config :"
          ls -l bt/config

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bt
          publish_branch: gh-pages
