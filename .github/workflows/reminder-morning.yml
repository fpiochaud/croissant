name: Rappel matin (lundi 7h30)

on:
  schedule:
    # Lundi 06:30 UTC = 07:30 heure de Paris (hiver)
    - cron: '30 6 * * 1'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub pour tester

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Envoyer le rappel matin
        run: node .github/scripts/send-reminders.js morning
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
