name: Rappel matin (lundi 5h50)

on:
  schedule:
    # Dimanche 18:50 UTC = Lundi 05:50 heure de Noumea (UTC+11)
    - cron: '50 18 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: "Forcer l'envoi même si déjà envoyé aujourd'hui"
        type: boolean
        default: false

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Envoyer le rappel matin
        run: node .github/scripts/send-reminders.js morning ${{ inputs.force == true && '--force' || '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
