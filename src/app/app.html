@if (croissant.authStatus() === 'loading') {
  <div class="auth-loading"><img src="croissantsgirl.webp" alt="Chargement…" class="auth-loading-img" /></div>
}

@if (croissant.authStatus() === 'unauthenticated' || croissant.authStatus() === 'blocked') {
  <croissant-login></croissant-login>
}

@if (croissant.authStatus() === 'authenticated') {
  <div class="app-shell">
    <croissant-header></croissant-header>
    <croissant-sync-bar></croissant-sync-bar>
    <croissant-navigation></croissant-navigation>

    <div class="tabs-viewport"
         #tabsViewport
         (touchstart)="onTouchStart($event)"
         (touchmove)="onTouchMove($event)"
         (touchend)="onTouchEnd()"
         (touchcancel)="onTouchEnd()">
      <div class="tabs-track"
           [class.no-transition]="isDragging() || noTransition()"
           [style.transform]="trackTransform()">
        <croissant-rotation></croissant-rotation>
        <croissant-remplacement></croissant-remplacement>
        <croissant-historique></croissant-historique>
        <croissant-rappels></croissant-rappels>
        <croissant-parametres></croissant-parametres>
      </div>
    </div>

    <croissant-modaux></croissant-modaux>
  </div>
}
