<div class="tab" [class.active]="croissant.activeTab() === 'historique'" id="tab-historique">
	<div class="section-pad">
		<div class="sec-label">Séances passées</div>
		<div id="history-list">
			@if (history().length === 0) {
				<div class="history-empty">Aucun événement pour l'instant.</div>
			}
			@for (event of history(); track $index) {
				<div class="history-row" [class.history-passage]="event.type === 'Passage'" [class.history-absence]="event.type === 'Absence'">
					<div class="history-icon">{{ event.type === 'Passage' ? '🥐' : '🔄' }}</div>
					<div class="history-body">
						<div class="history-main">{{ event.details?.text || '' }}</div>
						<div class="history-meta">
							<span class="history-date">{{ event.date }}</span>
							@if (event.details?.performedBy) {
								<span class="history-by">— par {{ event.details.performedBy }}</span>
							}
						</div>
					</div>
				</div>
			}
		</div>
	</div>
</div>
