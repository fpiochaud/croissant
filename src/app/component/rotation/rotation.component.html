<div class="tab" [class.active]="croissant.activeTab() === 'rotation'" id="tab-rotation">
	<div class="section-pad">
		<div class="sec-label">Ordre de passage</div>
		<div id="rotation-list">
			<div *ngFor="let person of personsWithDates()" class="person-card" (click)="editPerson(person)">
				<div class="rank-badge">{{person.initials}}</div>
				<div class="person-info">
					<div class="person-name">{{person.name}}</div>
					<div class="person-meta">🗓 {{person.dateLabel}}</div>
				</div>
				<div class="card-actions">
					@if (isCurrentUser(person) && !isFirst(person)) {
						<button class="card-btn card-btn-top" title="Passer en premier" (click)="$event.stopPropagation(); moveToTop(person)">⬆️</button>
					}
					@if (canEdit(person)) {
						<button class="card-btn card-btn-edit" (click)="$event.stopPropagation(); editPerson(person)">✏️</button>
					}
					@if (croissant.isAdmin()) {
						<button class="card-btn card-btn-delete" (click)="$event.stopPropagation(); deletePerson(person)">🗑️</button>
					}
				</div>
			</div>
		</div>
		<button class="add-person-btn" (click)="openAddModal()">➕ Ajouter une personne</button>
	</div>
</div>
